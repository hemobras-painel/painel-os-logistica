<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Comissionamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chama o seu arquivo CSS que está na pasta -->
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-clipboard-list"></i> Painel Dashboard</div>
        <div class="nav-menu">
            <button class="nav-btn active" onclick="mudarAba('Serviço')"><i class="fa-solid fa-screwdriver-wrench"></i> Ordens de Serviço</button>
            <button class="nav-btn" onclick="mudarAba('Compra')"><i class="fa-solid fa-boxes-stacked"></i> Logística & Compras</button>
        </div>
        <div class="conn-status">
            <span id="connIndicator" class="dot"></span>
            <span id="connText">Conectando...</span>
        </div>
    </aside>
    <main class="main-content">
        <div class="header">
            <h1 id="pageTitle">Gestão de Serviços</h1>
            <div class="header-actions">
                <select id="statusFilter" onchange="atualizarPainel()">
                    <option value="Todos">Todos os Status</option>
                </select>
                <!-- Botão de Sincronizar -->
                <button id="btnSync" class="btn-sync" onclick="forcarSincronizacao()">
                    <i class="fa-solid fa-arrows-rotate" id="syncIcon"></i> Atualizar
                </button>
            </div>
        </div>
        
        <!-- Cartões de Resumo -->
        <div class="kpi-grid" id="kpiGrid"></div>
        
        <!-- Tabela -->
        <div class="table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <!-- Chama o seu arquivo JavaScript que está na pasta -->
    <script src="JS/script.js"></script>
</body>
</html>
