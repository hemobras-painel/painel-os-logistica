<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Comissionamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-clipboard-list"></i> Painel Dashboard</div>
        <div class="nav-menu">
            <button class="nav-btn active" onclick="mudarAba('Serviço')"><i class="fa-solid fa-screwdriver-wrench"></i> Ordens de Serviço</button>
            <button class="nav-btn" onclick="mudarAba('Compra')"><i class="fa-solid fa-boxes-stacked"></i> Logística & Compras</button>
            <button class="nav-btn" onclick="mudarAba('Calibração')"><i class="fa-solid fa-microscope"></i> Calibrações & Certificados</button>
        </div>
        <div class="conn-status">
            <span id="connIndicator" class="dot"></span>
            <span id="connText">Conectando...</span>
        </div>
    </aside>
    <main class="main-content">
        <div class="header">
            <h1 id="pageTitle">Gestão de Serviços</h1>
            <div class="header-actions">
                <select id="statusFilter" onchange="atualizarPainel()">
                    <option value="Todos">Todos os Status</option>
                </select>
                <button id="btnSync" class="btn-sync" onclick="forcarSincronizacao()">
                    <i class="fa-solid fa-arrows-rotate" id="syncIcon"></i> Atualizar
                </button>
            </div>
        </div>
        
        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="charts-grid" id="chartsContainer">
            <div class="chart-card">
                <!-- ID novo no título do gráfico de Rosca -->
                <h3><i class="fa-solid fa-chart-pie" style="color: #3b82f6;"></i> <span id="chartTitlePie">Gargalos da Operação (Por Status)</span></h3>
                <div class="chart-wrapper"><canvas id="chartStatus"></canvas></div>
            </div>
            <div class="chart-card">
                <h3><i class="fa-solid fa-chart-simple" style="color: #d97706;"></i> <span id="chartTitleBar">Pendências Críticas</span></h3>
                <div class="chart-wrapper"><canvas id="chartBar"></canvas></div>
            </div>
        </div>
        
        <div class="table-container" id="tableContainer">
            <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
        </div>

        <div id="calibracaoContainer" style="display:none;"></div>
        
    </main>
    <script src="JS/script.js"></script>
</body>
</html>
